workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      java: 17
      vars:
        PACKAGE_NAME: "com.pulsefusionnet.app"
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Regenerate Gradle wrapper
        script: |
          # gradle-wrapper.jar isn't committed to the repo (it's a binary), so use the
          # build machine's own Gradle install to (re)generate it before using ./gradlew.
          gradle wrapper --gradle-version 8.7
      - name: Build Android debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - piyushpatil7911@gmail.com
        notify:
          success: true
          failure: true
